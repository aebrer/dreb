name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx biome check --error-on-warnings .
      - run: npx tsgo --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
      - name: Install ripgrep and fd
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(which fdfind)" "$HOME/.local/bin/fd"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: npm ci
      - run: npm run build
      - run: bash test.sh

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify-engines
      - run: npm run build
      - run: npx biome check --error-on-warnings .
      - run: npx tsgo --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install ripgrep and fd
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(which fdfind)" "$HOME/.local/bin/fd"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: npm ci
      - run: npm run build
      - run: bash test.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install ripgrep and fd
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find
          mkdir -p "$HOME/.local/bin"
          ln -sf "$(which fdfind)" "$HOME/.local/bin/fd"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: npm ci
      - run: npm run build
      - name: Generate coverage
        run: npm run coverage
        env:
          DREB_NO_LOCAL_LLM: 1
          NO_COLOR: 1
      - name: Post coverage comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- dreb-vitest-coverage -->";
            const summaryPath = "coverage/coverage-summary.json";

            if (!fs.existsSync(summaryPath)) {
              core.warning(`Coverage summary not found at ${summaryPath}; skipping PR comment.`);
              return;
            }

            const summary = JSON.parse(fs.readFileSync(summaryPath, "utf8"));
            const total = summary.total;
            const rows = [
              ["Statements", total.statements],
              ["Branches", total.branches],
              ["Functions", total.functions],
              ["Lines", total.lines],
            ]
              .map(([metric, data]) => `| ${metric} | ${data.covered} | ${data.total} | ${data.pct}% |`)
              .join("\n");

            const { owner, repo } = context.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = [
              marker,
              "## Vitest coverage",
              "",
              "| Metric | Covered | Total | Coverage |",
              "| --- | ---: | ---: | ---: |",
              rows,
              "",
              `[View full coverage run](${runUrl})`,
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.issue.number,
                body,
              });
            }

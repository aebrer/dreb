name: Publish to npm

on:
  release:
    types: [published]
  # Manual retry path: a failed publish run can be re-executed from master
  # (publish steps skip versions that are already on npm, so retries are safe).
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Install and build with the stock npm bundled with Node 22 (npm 10.x) —
      # the same toolchain the CI check/test jobs use and the one that generated
      # package-lock.json. npm 11.5.1's `npm ci` silently skips platform-specific
      # optional dependencies that the lockfile marks `optional: true, peer: true`
      # (e.g. @rollup/rollup-linux-x64-gnu), which breaks the vite build.
      - run: npm ci
      - run: npm run build
      # Trusted publishing (OIDC provenance) requires npm >= 11.5.1 — upgrade
      # only for the publish steps, after install/build are done.
      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.5.1
          npm --version

      - name: Publish @dreb/tui
        working-directory: packages/tui
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @dreb/tui@$VERSION version >/dev/null 2>&1; then
            echo "::warning::@dreb/tui@$VERSION already published, skipping"
          else
            npm publish
          fi

      - name: Publish @dreb/ai
        working-directory: packages/ai
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @dreb/ai@$VERSION version >/dev/null 2>&1; then
            echo "::warning::@dreb/ai@$VERSION already published, skipping"
          else
            npm publish
          fi

      - name: Publish @dreb/agent-core
        working-directory: packages/agent
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @dreb/agent-core@$VERSION version >/dev/null 2>&1; then
            echo "::warning::@dreb/agent-core@$VERSION already published, skipping"
          else
            npm publish
          fi

      - name: Publish @dreb/semantic-search
        working-directory: packages/semantic-search
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @dreb/semantic-search@$VERSION version >/dev/null 2>&1; then
            echo "::warning::@dreb/semantic-search@$VERSION already published, skipping"
          else
            npm publish
          fi

      - name: Publish @dreb/coding-agent
        working-directory: packages/coding-agent
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @dreb/coding-agent@$VERSION version >/dev/null 2>&1; then
            echo "::warning::@dreb/coding-agent@$VERSION already published, skipping"
          else
            npm publish
          fi

      - name: Publish @dreb/telegram
        working-directory: packages/telegram
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @dreb/telegram@$VERSION version >/dev/null 2>&1; then
            echo "::warning::@dreb/telegram@$VERSION already published, skipping"
          else
            npm publish
          fi

      - name: Publish @dreb/dashboard
        working-directory: packages/dashboard
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @dreb/dashboard@$VERSION version >/dev/null 2>&1; then
            echo "::warning::@dreb/dashboard@$VERSION already published, skipping"
          else
            npm publish
          fi

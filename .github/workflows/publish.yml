name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build

      - name: Publish @dreb/tui
        working-directory: packages/tui
        run: npm publish

      - name: Publish @dreb/ai
        working-directory: packages/ai
        run: npm publish

      - name: Publish @dreb/agent-core
        working-directory: packages/agent
        run: npm publish

      - name: Publish @dreb/coding-agent
        working-directory: packages/coding-agent
        run: npm publish

      - name: Publish @dreb/telegram
        working-directory: packages/telegram
        run: npm publish
